<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>強咖這樣背 - 專業正式版</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

        .logo-img { height: 50px; width: auto; }

        h2 { color: #1a73e8; margin: 0; font-size: 24px; white-space: nowrap; }
        .form-group { margin-bottom: 25px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        label { font-weight: bold; color: #5f6368; border-left: 4px solid #1a73e8; padding-left: 8px; margin: 0; }
        .timer-display { color: #d93025; font-weight: bold; font-family: monospace; font-size: 18px; background: #fce8e6; padding: 4px 12px; border-radius: 6px; border: 1px solid #fad2cf; transition: all 0.3s; }
        .timer-count-up { color: #1a73e8 !important; background: #e8f0fe !important; border-color: #c2d7fa !important; }
        .ip-marker { font-size: 13px; color: #1a73e8; background: #e8f0fe; padding: 2px 10px; border-radius: 20px; font-weight: bold; border: 1px solid #c2d7fa; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .action-btn { padding: 12px; border: 2px solid #dadce0; border-radius: 8px; background: white; color: #5f6368; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s ease; }
        .phrase-btn-style { background-color: #fdf5e6 !important; border-color: #f5deb3; }
        .action-btn.active { background-color: #1a73e8 !important; color: #ffffff !important; border-color: #1a73e8 !important; box-shadow: 0 2px 8px rgba(26, 115, 232, 0.4); }
        select { width: 100%; padding: 12px; border: 2px solid #dadce0; border-radius: 8px; font-size: 16px; cursor: pointer; background-color: #fff; }
        .quizlet-box { margin-top: 10px; padding: 15px; background: #eef4ff; border-radius: 8px; border: 1px dashed #1a73e8; text-align: center; }
        .quizlet-link { color: #1a73e8; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .quizlet-img { height: 24px; width: auto; vertical-align: middle; }
        .audio-player { margin-top: 30px; padding: 20px; background: #fff; border-radius: 16px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: none; position: relative; }
        .player-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .speed-control { background: #e8f0fe; padding: 5px 12px; border-radius: 8px; color: #1a73e8; font-weight: bold; cursor: pointer; border: none; font-size: 14px; }
        #audioTitle { font-weight: bold; color: #3c4043; font-size: 14px; text-align: center; flex-grow: 1; }

</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="LOGO.png" alt="Logo" class="logo-img">
        <h2>強咖這樣背</h2>
        <img id="dynamicCover" src="" alt="Cover" class="book-cover-img">
    </div>

    <div class="form-group">
        <div class="label-row">
            <label>1. 選擇教材</label>
            <div id="userMarker" class="ip-marker">...</div>
        </div>
        <div class="btn-grid" style="grid-template-columns: repeat(3, 1fr);">
            <button class="action-btn book-btn" data-type="vocab" data-value="Book1" data-start="1" data-cover="BOOK1封面.png">Book 1</button>
            <button class="action-btn book-btn" data-type="vocab" data-value="Book2" data-start="19" data-cover="BOOK2封面.png">Book 2</button>
            <button class="action-btn book-btn" data-type="vocab" data-value="Book3" data-start="37" data-cover="BOOK3封面.png">Book 3</button>
            <button class="action-btn book-btn phrase-btn-style" data-type="phrase" data-value="Phrase 1" data-start="1" data-cover="片語強咖這樣背上冊封面.png" style="grid-column: span 1.5;">片語(上)</button>
            <button class="action-btn book-btn phrase-btn-style" data-type="phrase" data-value="Phrase 2" data-start="26" data-cover="片語強咖這樣背下冊封面.png" style="grid-column: span 1.5;">片語(下)</button>
        </div>
    </div>

    <div class="form-group">
        <div class="label-row">
            <label>2. 選擇週次</label>
            <div id="countdown" class="timer-display">10:00</div>
        </div>
        <select id="weekSelect" disabled><option value="">-- 請先選擇教材 --</option></select>
    </div>

    <div class="form-group" id="unitArea" style="display:none;">
        <label>3. 選擇單元</label>
        <div id="unitBtnGroup" class="btn-grid"></div>
    </div>

    <div class="form-group" id="contentArea" style="display:none;">
        <label id="contentLabel">4. 播放內容</label>
        <div id="contentBtnGroup" class="btn-grid"></div>
    </div>

    <div id="quizletArea" class="form-group" style="display:none;">
        <label id="quizletTitle">5. Quizlet 練習</label>
        <div class="quizlet-box">
            <a id="quizletLink" class="quizlet-link" href="#" target="_blank">
                <img src="Quizlet圖片.png" alt="Quizlet" class="quizlet-img">
                <span>開啟 Quizlet 練習</span>
            </a>
        </div>
    </div>

    <div id="dailyAudioArea" class="form-group" style="display:none;">
        <label id="dailyAudioTitle">6. 每日英語聽力</label>
        <div class="quizlet-box" style="border-color: #34a853; background: #e6f4ea;">
            <a id="dailyAudioLink" class="dailyAudio-link quizlet-link" href="#" target="_blank" style="color: #1e8e3e;">
                <span class="material-icons">headphones</span>
                <span>開啟 每日英語聽力 練習</span>
            </a>
        </div>
    </div>

    <div id="playerSection" class="audio-player">
        <div class="player-top-row">
            <button id="speedBtn" class="speed-control" onclick="cycleSpeed()">1.0x</button>
            <span id="audioTitle">準備播放...</span>
            <div style="width: 45px;"></div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div id="ab-range"></div>
            <div id="labelA" class="ab-label" style="display:none;">A</div>
            <div id="labelB" class="ab-label" style="display:none;">B</div>
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="time-display"><span id="currentTime">00:00</span><span id="durationTime">00:00</span></div>
        <audio id="mainAudio"></audio>
        <div class="main-controls">
            <button class="ctrl-btn material-icons" onclick="changeTrack(-1)">skip_previous</button>
            <button class="ctrl-btn material-icons" onclick="mainAudio.currentTime-=5">replay_5</button>
            <button id="playPauseBtn" class="ctrl-btn material-icons" onclick="togglePlay()">play_circle_filled</button>
            <button class="ctrl-btn material-icons" onclick="mainAudio.currentTime+=5">forward_5</button>
            <button class="ctrl-btn material-icons" onclick="changeTrack(1)">skip_next</button>
        </div>
        <div class="ab-action-group">
            <button id="btnA" class="ab-btn" onclick="setAB('A')">標記 A</button>
            <button id="btnB" class="ab-btn" onclick="setAB('B')">標記 B</button>
            <button class="ab-btn" style="color:#d93025;" onclick="resetAB()">重置</button>
        </div>
    </div>
</div>

            "107": "https://cn.eudic.net/ting/openArticle?id=3636b17c-a607-4ee3-acb3-1df43db11d03",
            "108": "https://cn.eudic.net/ting/openArticle?id=44b66d68-1230-45c6-b4f6-d73d69f042d8"
        }, "Phrase 1": {}, "Phrase 2": {}, "Appendix": {}
    };

    (function init() {
        const animals = ['🐶','🐱','🦁','🦊','🐼','🐨','🐥','🐸','🐙','🦄'];
        userIdentifier = `${animals[Math.floor(Math.random()*10)]} ${Math.floor(Math.random()*899+100)}`;
        document.getElementById('userMarker').innerText = userIdentifier;
    })();

    function startTimer() { if (!timerId) timerId = setInterval(updateTimer, 1000); }

    function updateTimer() {
        const timerEl = document.getElementById('countdown');
        if (isCountDown) {
            if (timeLeft > 0) {
                timeLeft--;
                renderTimer(timeLeft);
            } else {
                clearInterval(timerId); timerId = null;
                const unitInfo = state.bookType === 'vocab' ? `第 ${state.week} 週 (Unit ${state.unit})` : `第 ${state.week} 週`;
                const msg = `恭喜過關！ 🥳\n\n🔹 驗證標記：${userIdentifier}\n📖 教材：${state.bookName}\n📅 週次：${unitInfo}\n🎵 內容：${state.currentLabel}\n\n請截圖此畫面以供查驗。按下確定後將繼續為您計時學習時間。`;
                alert(msg);
                isCountDown = false; totalElapsed = 600; 
                timerEl.classList.add('timer-count-up'); renderTimer(totalElapsed);
                if (!mainAudio.paused) startTimer();
            }
        } else { totalElapsed++; renderTimer(totalElapsed); }
    }

    function renderTimer(s) {
        let m = Math.floor(s/60), sec = s%60;
        document.getElementById('countdown').innerText = `${m}:${sec.toString().padStart(2,'0')}`;
    }

    document.querySelectorAll('.book-btn').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.book-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            state.bookName = this.innerText; state.bookCode = this.dataset.value;
            state.bookType = this.dataset.type; state.startWeek = parseInt(this.dataset.start);
            document.getElementById('dynamicCover').src = this.dataset.cover;
            document.getElementById('dynamicCover').style.display = 'block';
            const ws = document.getElementById('weekSelect'); ws.disabled = false;
            ws.innerHTML = '<option value="">-- 選擇週次 --</option>';
            let count = (state.bookType === 'vocab') ? 18 : 25;
            for(let i=0; i<count; i++) ws.innerHTML += `<option value="${state.startWeek+i}">第 ${state.startWeek+i} 週</option>`;
            document.getElementById('unitArea').style.display = 'none';
            document.getElementById('contentArea').style.display = 'none';
            document.getElementById('quizletArea').style.display = 'none';
            document.getElementById('dailyAudioArea').style.display = 'none';
        }
    });

    document.getElementById('weekSelect').onchange = function() {
        state.week = parseInt(this.value);
        if(state.bookType === 'vocab') {
            document.getElementById('unitArea').style.display = 'block';
            const group = document.getElementById('unitBtnGroup'); group.innerHTML = '';
            const unitBase = (state.week - 1) * 2 + 1;
            [unitBase, unitBase + 1].forEach(u => {
                const b = document.createElement('button'); b.className='action-btn'; b.innerText=`Unit ${u}`;
                b.onclick = () => {
                    Array.from(group.children).forEach(x=>x.classList.remove('active')); b.classList.add('active');
                    state.unit = u; renderContentBtns(u, true);
                };
                group.appendChild(b);
            });
        } else { 
            state.unit = 0; renderContentBtns(state.week, false);
            updateExternalLinks('phrase', state.week);
        }
    };

    function renderContentBtns(num, isVocab) {
        document.getElementById('contentArea').style.display = 'block';
        const group = document.getElementById('contentBtnGroup'); group.innerHTML = '';
        const labels = isVocab ? ['造句單元','附錄字表'] : ['字表','造句'];
        labels.forEach((l, idx) => {
            const b = document.createElement('button'); b.className='action-btn'; b.innerText = l;
            let fIdx = isVocab ? ((num-((state.startWeek-1)*2+1))*2+(idx+1)) : ((num-state.startWeek)*2+(idx+1));
            b.onclick = () => {
                playFile(fIdx, b, l);
                if(isVocab) updateExternalLinks(l === '造句單元' ? 'vocab' : 'appendix', num);
            };
            group.appendChild(b);
        });
    }

    // 關鍵修正：同時更新 Quizlet 與 每日英語聽力 [cite: 84-90]
    function updateExternalLinks(type, num) {
        let qUrl = null;
        let aUrl = null;
        let qTitle = "5. Quizlet 練習";
        let aTitle = "6. 每日英語聽力";

        if (type === 'appendix') {
            qUrl = quizletData["Appendix"] ? quizletData["Appendix"][num] : null;
            aUrl = (dailyAudioData["Appendix"] && dailyAudioData["Appendix"][num]) ? dailyAudioData["Appendix"][num] : null;
            qTitle += ` (附錄 ${num})`; aTitle += ` (附錄 ${num})`;
        } else {
            qUrl = quizletData[state.bookCode] ? quizletData[state.bookCode][num] : null;
            aUrl = (dailyAudioData[state.bookCode] && dailyAudioData[state.bookCode][num]) ? dailyAudioData[state.bookCode][num] : null;
            const label = (type === 'phrase') ? "Week" : "Unit";
            qTitle += ` (${label} ${num})`; aTitle += ` (${label} ${num})`;
        }

        const qArea = document.getElementById('quizletArea');
        if (qUrl) {
            document.getElementById('quizletTitle').innerText = qTitle;
            document.getElementById('quizletLink').href = qUrl;
            qArea.style.display = 'block';
        } else { qArea.style.display = 'none'; }

        const aArea = document.getElementById('dailyAudioArea');
        if (aUrl) {
            document.getElementById('dailyAudioTitle').innerText = aTitle;
            document.getElementById('dailyAudioLink').href = aUrl;
            aArea.style.display = 'block';
        } else { aArea.style.display = 'none'; }
    }

    function playFile(idx, btn, label) {
        state.fileIdx = idx; state.currentLabel = label;
        if(btn) { Array.from(btn.parentElement.children).forEach(x=>x.classList.remove('active')); btn.classList.add('active'); }
        mainAudio.src = `${state.bookCode}_${idx.toString().padStart(2, '0')}.mp3`;
        document.getElementById('audioTitle').innerText = label;
        mainAudio.play(); document.getElementById('playerSection').style.display = 'block';
        resetAB();
    }

    function cycleSpeed() {
        let idx = (speeds.indexOf(state.currentSpeed) + 1) % speeds.length;
        state.currentSpeed = speeds[idx];
        mainAudio.playbackRate = state.currentSpeed;
        document.getElementById('speedBtn').innerText = state.currentSpeed + 'x';
    }

    function setAB(t) {
        const d = mainAudio.duration, c = mainAudio.currentTime; if(!d) return;
        if(t==='A') { pointA = c; document.getElementById('labelA').style.left=(c/d*100)+'%'; document.getElementById('labelA').style.display='block'; document.getElementById('btnA').classList.add('active'); }
        else { pointB = c; document.getElementById('labelB').style.left=(c/d*100)+'%'; document.getElementById('labelB').style.display='block'; document.getElementById('btnB').classList.add('active'); }
        if(pointA!==null && pointB!==null) {
            const s=Math.min(pointA,pointB), e=Math.max(pointA,pointB);
            const r=document.getElementById('ab-range'); r.style.left=(s/d*100)+'%'; r.style.width=((e-s)/d*100)+'%'; r.style.display='block';
        }
    }

    function resetAB() {
        pointA=null; pointB=null;
        document.getElementById('ab-range').style.display='none';
        document.getElementById('labelA').style.display='none'; document.getElementById('labelB').style.display='none';
        document.getElementById('btnA').classList.remove('active'); document.getElementById('btnB').classList.remove('active');
    }

    mainAudio.ontimeupdate = () => {
        const c = mainAudio.currentTime, d = mainAudio.duration || 1;
        document.getElementById('progressBar').style.width = (c/d*100)+'%';
        document.getElementById('currentTime').innerText = fmt(c); document.getElementById('durationTime').innerText = fmt(d);
        if(pointA!==null && pointB!==null && c >= Math.max(pointA,pointB)) mainAudio.currentTime = Math.min(pointA,pointB);
    };

    function togglePlay() { mainAudio.paused ? mainAudio.play() : mainAudio.pause(); }
    mainAudio.onplay = () => { document.getElementById('playPauseBtn').innerText = "pause_circle_filled"; startTimer(); };
    mainAudio.onpause = () => { document.getElementById('playPauseBtn').innerText = "play_circle_filled"; clearInterval(timerId); timerId = null; };
    function fmt(s){ return Math.floor(s/60)+":"+Math.floor(s%60).toString().padStart(2,'0'); }
    function changeTrack(dir) { playFile(state.fileIdx+dir, null, "切換中..."); }
</script>
</body>
</html>
