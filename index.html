        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .action-btn { padding: 12px; border: 2px solid #dadce0; border-radius: 8px; background: white; color: #5f6368; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s ease; }
        .phrase-btn-style { background-color: #fdf5e6 !important; border-color: #f5deb3; }
        .action-btn.active { background-color: #1a73e8 !important; color: #ffffff !important; border-color: #1a73e8 !important; box-shadow: 0 2px 8px rgba(26, 115, 232, 0.4); }

        .quizlet-img { height: 24px; width: auto; vertical-align: middle; }
        .audio-player { margin-top: 30px; padding: 20px; background: #fff; border-radius: 16px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: none; position: relative; }
        .player-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .speed-control { background: #e8f0fe; padding: 5px 12px; border-radius: 8px; color: #1a73e8; font-weight: bold; cursor: pointer; border: none; font-size: 14px; }
        #audioTitle { font-weight: bold; color: #3c4043; font-size: 14px; text-align: center; flex-grow: 1; }
        .progress-container { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; position: relative; cursor: pointer; margin: 30px 0 10px; }
        .progress-bar { height: 100%; background: #1a73e8; width: 0%; border-radius: 3px; position: relative; z-index: 2; }
        #ab-range { position: absolute; height: 100%; background: rgba(255, 167, 38, 0.4); z-index: 1; display: none; }

            </a>
        </div>
    </div>

            <div id="labelB" class="ab-label" style="display:none;">B</div>

        </div>

        <audio id="mainAudio"></audio>
        <div class="main-controls">
            <button class="ctrl-btn material-icons" onclick="changeTrack(-1)">skip_previous</button>
            <button class="ctrl-btn material-icons" onclick="mainAudio.currentTime-=5">replay_5</button>
            <button id="playPauseBtn" class="ctrl-btn material-icons" onclick="togglePlay()">play_circle_filled</button>
            <button class="ctrl-btn material-icons" onclick="mainAudio.currentTime+=5">forward_5</button>
            <button class="ctrl-btn material-icons" onclick="changeTrack(1)">skip_next</button>
        </div>
        <div class="ab-action-group">
            <button id="btnA" class="ab-btn" onclick="setAB('A')">標記 A</button>

    function startTimer() { if (!timerId) timerId = setInterval(updateTimer, 1000); }
    function updateTimer() {
        const timerEl = document.getElementById('countdown');
        if (isCountDown) {
            if (timeLeft > 0) { timeLeft--; renderTimer(timeLeft); }
            else {
                clearInterval(timerId); timerId = null;
                const unitText = state.bookType === 'vocab' ? `第 ${state.week} 週 (Unit ${state.unit})` : `第 ${state.week} 週`;
                alert(`恭喜過關！ 🥳\n驗證標記：${userIdentifier}\n教材：${state.bookName}\n週次：${unitText}\n內容：${state.currentLabel}`);
                isCountDown = false; timerEl.classList.add('timer-count-up');
                renderTimer(totalElapsed); if (!mainAudio.paused) startTimer();
            }
        } else { renderTimer(totalElapsed); totalElapsed++; }
    }
    function renderTimer(s) {
        let m = Math.floor(s/60), sec = s%60;
        document.getElementById('countdown').innerText = `${m}:${sec.toString().padStart(2,'0')}`;
    }

            const ws = document.getElementById('weekSelect'); ws.disabled = false;
            ws.innerHTML = '<option value="">-- 選擇週次 --</option>';
            let count = (state.bookType === 'vocab') ? 18 : 25;
            for(let i=0; i<count; i++) ws.innerHTML += `<option value="${state.startWeek+i}">第 ${state.startWeek+i} 週</option>`;
            document.getElementById('unitArea').style.display = 'none';
            document.getElementById('contentArea').style.display = 'none';
            document.getElementById('quizletArea').style.display = 'none';
            document.getElementById('listeningArea').style.display = 'none';
        }
    });

    document.getElementById('weekSelect').onchange = function() {
        state.week = parseInt(this.value);
        if(state.bookType === 'vocab') {
            document.getElementById('unitArea').style.display = 'block';
            const group = document.getElementById('unitBtnGroup'); group.innerHTML = '';
            const unitBase = (state.week - 1) * 2 + 1;
            [unitBase, unitBase + 1].forEach(u => {
                const b = document.createElement('button'); b.className='action-btn'; b.innerText=`Unit ${u}`;
                b.onclick = () => {
                    Array.from(group.children).forEach(x=>x.classList.remove('active')); b.classList.add('active');
                    state.unit = u; renderContentBtns(u, true);
                    updateQuizlet('vocab', u); updateListening(u);
                };
                group.appendChild(b);
            });
        } else { 
            renderContentBtns(state.week, false); 
            updateQuizlet('phrase', state.week); 
            document.getElementById('listeningArea').style.display = 'none'; 
        }
    };

    function renderContentBtns(num, isVocab) {
        document.getElementById('contentArea').style.display = 'block';
        const group = document.getElementById('contentBtnGroup'); group.innerHTML = '';
        const labels = isVocab ? ['造句單元','附錄字表'] : ['字表','造句'];
        labels.forEach((l, idx) => {
            const b = document.createElement('button'); b.className='action-btn'; b.innerText = l;
            let fIdx = isVocab ? ((num-((state.startWeek-1)*2+1))*2+(idx+1)) : ((num-state.startWeek)*2+(idx+1));
            b.onclick = () => {
                playFile(fIdx, b, l);
                // 點選播放內容按鈕時，同步更新 Quizlet 連結 (區分單元或附錄)
                if(isVocab) {
                    const quizKey = (l === '附錄字表') ? 'A' + num : num.toString();
                    updateQuizlet('vocab', quizKey);
                }
            };
            group.appendChild(b);
        });
    }

    function updateQuizlet(type, key) {
        let url = quizletData[state.bookCode] ? quizletData[state.bookCode][key] : null;
        if(url) {
            document.getElementById('quizletLink').href = url;
            let titleText = (type === 'vocab') ? (key.toString().startsWith('A') ? `Appendix ${key.substring(1)}` : `Unit ${key}`) : `Week ${key}`;
            document.getElementById('quizletTitle').innerText = `5. Quizlet 練習 (${titleText})`;
            document.getElementById('quizletArea').style.display = 'block';
        } else { document.getElementById('quizletArea').style.display = 'none'; }
    }

    function updateListening(num) {
        let url = (listeningData["Book1"] && listeningData["Book1"][num]) ? listeningData["Book1"][num] : null;
        if(url) {
            document.getElementById('listeningLink').href = url;
            document.getElementById('listeningTitle').innerText = `6. 每日英語聽力 (Unit ${num})`;
            document.getElementById('listeningArea').style.display = 'block';
        } else { document.getElementById('listeningArea').style.display = 'none'; }
    }

    function playFile(idx, btn, label) {
        state.fileIdx = idx; state.currentLabel = label;
        if(btn) { Array.from(btn.parentElement.children).forEach(x=>x.classList.remove('active')); btn.classList.add('active'); }
        mainAudio.src = `${state.bookCode}_${idx.toString().padStart(2, '0')}.mp3`;
        document.getElementById('audioTitle').innerText = label;
        mainAudio.play(); document.getElementById('playerSection').style.display = 'block'; resetAB();
    }

    function cycleSpeed() {
        let idx = (speeds.indexOf(state.currentSpeed) + 1) % speeds.length;
        state.currentSpeed = speeds[idx];
        mainAudio.playbackRate = state.currentSpeed;
        document.getElementById('speedBtn').innerText = state.currentSpeed + 'x';
    }

    function setAB(t) {
        const d = mainAudio.duration, c = mainAudio.currentTime; if(!d) return;
        if(t==='A') { pointA = c; document.getElementById('labelA').style.left=(c/d*100)+'%'; document.getElementById('labelA').style.display='block'; document.getElementById('btnA').classList.add('active'); }
        else { pointB = c; document.getElementById('labelB').style.left=(c/d*100)+'%'; document.getElementById('labelB').style.display='block'; document.getElementById('btnB').classList.add('active'); }
        if(pointA!==null && pointB!==null) {
            const s=Math.min(pointA,pointB), e=Math.max(pointA,pointB);
            const r=document.getElementById('ab-range'); r.style.left=(s/d*100)+'%'; r.style.width=((e-s)/d*100)+'%'; r.style.display='block';
        }
    }

    function resetAB() {
        pointA=null; pointB=null; document.getElementById('ab-range').style.display='none';
        document.getElementById('labelA').style.display='none'; document.getElementById('labelB').style.display='none';
        document.getElementById('btnA').classList.remove('active'); document.getElementById('btnB').classList.remove('active');
    }

    mainAudio.ontimeupdate = () => {
        const c = mainAudio.currentTime, d = mainAudio.duration || 1;
        document.getElementById('progressBar').style.width = (c/d*100)+'%';
        document.getElementById('currentTime').innerText = fmt(c); document.getElementById('durationTime').innerText = fmt(d);
        if(pointA!==null && pointB!==null && c >= Math.max(pointA,pointB)) mainAudio.currentTime = Math.min(pointA,pointB);
    };

    function togglePlay() { mainAudio.paused ? mainAudio.play() : mainAudio.pause(); }
    mainAudio.onplay = () => { document.getElementById('playPauseBtn').innerText = "pause_circle_filled"; startTimer(); };
    mainAudio.onpause = () => { document.getElementById('playPauseBtn').innerText = "play_circle_filled"; clearInterval(timerId); timerId = null; };
    function fmt(s){ return Math.floor(s/60)+":"+Math.floor(s%60).toString().padStart(2,'0'); }
    function changeTrack(dir) { playFile(state.fileIdx+dir, null, "切換中..."); }
</script>
</body>
</html>
