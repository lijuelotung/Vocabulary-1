<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>強咖這樣背 - 強化計時版</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding: 20px; line-height: 1.6; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .logo-img { height: 50px; width: auto; }
        .book-cover-img { height: 60px; width: auto; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        h2 { color: #1a73e8; margin: 0; font-size: 24px; white-space: nowrap; }
        
        .form-group { margin-bottom: 25px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        label { font-weight: bold; color: #5f6368; border-left: 4px solid #1a73e8; padding-left: 8px; margin: 0; }
        
        .timer-display { color: #d93025; font-weight: bold; font-family: monospace; font-size: 18px; background: #fce8e6; padding: 4px 12px; border-radius: 6px; border: 1px solid #fad2cf; }
        .ip-marker { font-size: 13px; color: #1a73e8; background: #e8f0fe; padding: 2px 10px; border-radius: 20px; font-weight: bold; border: 1px solid #c2d7fa; }

        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .action-btn { padding: 12px; border: 2px solid #dadce0; border-radius: 8px; background: white; color: #5f6368; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s ease; }
        .phrase-btn-style { background-color: #fdf5e6 !important; border-color: #f5deb3; }
        .action-btn.active { background-color: #1a73e8 !important; color: #ffffff !important; border-color: #1a73e8 !important; box-shadow: 0 2px 8px rgba(26, 115, 232, 0.4); }

        select { width: 100%; padding: 12px; border: 2px solid #dadce0; border-radius: 8px; font-size: 16px; cursor: pointer; background-color: #fff; }

        .audio-player { margin-top: 30px; display: none; padding: 45px 20px 20px; background: white; border-radius: 12px; position: relative; border-top: 1px solid #eee; }
        #audioTitle { font-weight: bold; color: #1a73e8; display: block; text-align: center; margin-bottom: 20px; font-size: 14px; min-height: 1.2em; }
        .player-top-ctrls { position: absolute; top: 10px; width: calc(100% - 40px); display: flex; justify-content: space-between; align-items: center; }
        .speed-pill { background: #e8f0fe; color: #1a73e8; padding: 6px 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .progress-container { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; position: relative; cursor: pointer; margin: 20px 0; }
        .progress-bar { height: 100%; background: #1a73e8; width: 0%; border-radius: 4px; position: relative; }
        .ab-marker { position: absolute; top: -18px; color: #EF6C00; font-weight: bold; font-size: 12px; transform: translateX(-50%); display: none; }
        .ab-highlight { height: 100%; background: rgba(255, 152, 0, 0.3); position: absolute; top: 0; display: none; border-radius: 4px; }
        .time-display { display: flex; justify-content: space-between; font-size: 12px; color: #5f6368; font-family: monospace; }

        .main-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0; }
        .ctrl-btn { border: none; background: none; color: #3c4043; font-size: 32px; cursor: pointer; }
        #playPauseBtn { font-size: 55px; color: #1a73e8; }
        
        .ab-set-group { display: flex; justify-content: space-around; gap: 8px; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ddd; }
        .ab-set-btn { flex: 1; border: 1px solid #dadce0; border-radius: 8px; padding: 10px 5px; background: white; color: #5f6368; cursor: pointer; font-size: 13px; font-weight: bold; }
        .ab-set-btn.active { background: #fff7e6; color: #EF6C00; border-color: #EF6C00; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="LOGO.png" alt="Logo" class="logo-img">
        <h2>強咖這樣背</h2>
        <img id="dynamicCover" src="" alt="Cover" class="book-cover-img">
    </div>

    <div class="form-group">
        <div class="label-row">
            <label>1. 選擇教材</label>
            <div id="userMarker" class="ip-marker">...</div>
        </div>
        <div class="btn-grid" style="grid-template-columns: repeat(3, 1fr);">
            <button class="action-btn book-btn" data-type="vocab" data-value="Book1" data-cover="BOOK1封面.png">Book 1</button>
            <button class="action-btn book-btn" data-type="vocab" data-value="Book2" data-cover="BOOK2封面.png">Book 2</button>
            <button class="action-btn book-btn" data-type="vocab" data-value="Book3" data-cover="BOOK3封面.png">Book 3</button>
            <button class="action-btn book-btn phrase-btn-style" data-type="phrase" data-value="PhraseUp" data-cover="片語強咖這樣背上冊封面.png" style="grid-column: span 1.5;">片語(上)</button>
            <button class="action-btn book-btn phrase-btn-style" data-type="phrase" data-value="PhraseDown" data-cover="片語強咖這樣背下冊封面.png" style="grid-column: span 1.5;">片語(下)</button>
        </div>
    </div>

    <div class="form-group">
        <div class="label-row">
            <label>2. 選擇週次</label>
            <div id="countdown" class="timer-display">10:00</div>
        </div>
        <select id="weekSelect" disabled><option value="">-- 請先選擇教材 --</option></select>
    </div>

    <div class="form-group" id="unitArea" style="display:none;">
        <label>3. 選擇單元</label>
        <div id="unitBtnGroup" class="btn-grid"></div>
    </div>

    <div class="form-group" id="contentArea" style="display:none;">
        <label id="contentLabel">4. 播放內容</label>
        <div id="contentBtnGroup" class="btn-grid"></div>
    </div>

    <div id="playerSection" class="audio-player">
        <div class="player-top-ctrls">
            <button id="speedBtn" class="speed-pill">1.0x</button>
            <span style="font-size: 11px; color: #999;">AB 模式已啟動</span>
        </div>
        <span id="audioTitle"></span>
        <div class="progress-container" id="progressContainer">
            <div id="abHighlight" class="ab-highlight"></div>
            <div id="progressBar" class="progress-bar"></div>
            <div id="markerA" class="ab-marker">▼A</div>
            <div id="markerB" class="ab-marker">▼B</div>
        </div>
        <div class="time-display"><span id="currentTime">00:00</span><span id="durationTime">00:00</span></div>
        <audio id="mainAudio"></audio>
        <div class="main-controls">
            <button class="ctrl-btn material-icons" onclick="skipTrack(-1)">skip_previous</button>
            <button class="ctrl-btn material-icons" onclick="mainAudio.currentTime-=5">replay_5</button>
            <button id="playPauseBtn" class="ctrl-btn material-icons" onclick="togglePlay()">play_circle_filled</button>
            <button class="ctrl-btn material-icons" onclick="mainAudio.currentTime+=5">forward_5</button>
            <button class="ctrl-btn material-icons" onclick="skipTrack(1)">skip_next</button>
        </div>
        <div class="ab-set-group">
            <button id="setABBtnA" class="ab-set-btn" onclick="setPoint('A')">標記 A 點</button>
            <button id="setABBtnB" class="ab-set-btn" onclick="setPoint('B')">標記 B 點</button>
            <button class="ab-set-btn" style="color:#d93025;" onclick="resetAB()">清除標記</button>
        </div>
    </div>
</div>

<script>
    const mainAudio = document.getElementById('mainAudio');
    let state = { book: "", bookType: "", week: 0, currentIdx: 1 };
    let pointA = null, pointB = null;
    let timeLeft = 600;
    let timerId = null;

    // --- 強制啟動計時器函式 ---
    function startCountdown() {
        if (!timerId && !mainAudio.paused) {
            console.log("計時器啟動");
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerUI();
                } else {
                    stopCountdown();
                    alert("恭喜過關！！🥳");
                }
            }, 1000);
        }
    }

    function stopCountdown() {
        clearInterval(timerId);
        timerId = null;
    }

    function updateTimerUI() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('countdown').innerText = `${m}:${s.toString().padStart(2, '0')}`;
    }

    // --- 監聽播放狀態 ---
    mainAudio.addEventListener('play', startCountdown);
    mainAudio.addEventListener('pause', stopCountdown);
    mainAudio.addEventListener('ended', stopCountdown);
    // 預防機制：播放中若計時器沒跑，強迫補啟動
    mainAudio.addEventListener('timeupdate', () => {
        if (!mainAudio.paused && !timerId) startCountdown();
        updateProgressUI();
    });

    // --- 初始化隨機標記 ---
    (function initMarker() {
        const animals = ['🐶','🐱','🦁','🦊','🐼','🐨','🐯','🐸','🐷','🐥','🦄'];
        const randomAnimal = animals[Math.floor(Math.random() * animals.length)];
        const fakeIP = Math.floor(Math.random() * 899 + 100);
        document.getElementById('userMarker').innerText = `${randomAnimal} ${fakeIP}`;
    })();

    // --- 介面聯動 ---
    document.querySelectorAll('.book-btn').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.book-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            state.book = this.dataset.value;
            state.bookType = this.dataset.type;
            document.getElementById('dynamicCover').src = this.dataset.cover;
            document.getElementById('dynamicCover').style.display = 'block';
            const ws = document.getElementById('weekSelect');
            ws.disabled = false;
            ws.innerHTML = '<option value="">-- 選擇週次 --</option>';
            let start = 1, end = 50;
            if(state.book === "Book1") { start = 1; end = 18; }
            else if(state.book === "Book2") { start = 19; end = 36; }
            else if(state.book === "Book3") { start = 37; end = 54; }
            else if(state.book === "PhraseUp") { start = 1; end = 25; }
            else if(state.book === "PhraseDown") { start = 26; end = 50; }
            for(let i=start; i<=end; i++) ws.innerHTML += `<option value="${i}">第 ${i} 週</option>`;
            document.getElementById('unitArea').style.display = 'none';
            document.getElementById('contentArea').style.display = 'none';
        }
    });

    document.getElementById('weekSelect').onchange = function() {
        state.week = parseInt(this.value);
        if(state.bookType === "vocab") {
            document.getElementById('unitArea').style.display = 'block';
            const group = document.getElementById('unitBtnGroup'); group.innerHTML = '';
            const uStart = (state.week - 1) * 2 + 1;
            [uStart, uStart+1].forEach(u => {
                const b = document.createElement('button'); b.className='action-btn'; b.innerText=`Unit ${u}`;
                b.onclick = () => {
                    Array.from(group.children).forEach(x=>x.classList.remove('active')); b.classList.add('active');
                    state.unit = u; renderContentBtns(u, true);
                };
                group.appendChild(b);
            });
        } else {
            renderContentBtns(state.week, false);
        }
    };

    function renderContentBtns(num, isVocab) {
        document.getElementById('contentArea').style.display = 'block';
        const group = document.getElementById('contentBtnGroup'); group.innerHTML = '';
        const labels = isVocab ? ['造句單元','附錄字表'] : ['字表','造句'];
        labels.forEach((l, idx) => {
            const b = document.createElement('button'); b.className='action-btn'; b.innerText = l;
            const fileIdx = num * 2 - (idx === 0 ? 1 : 0);
            b.onclick = () => playFile(fileIdx, b, l);
            group.appendChild(b);
        });
    }

    function playFile(idx, btn, label) {
        state.currentIdx = idx;
        if(btn) { Array.from(btn.parentElement.children).forEach(x=>x.classList.remove('active')); btn.classList.add('active'); }
        const fileName = `${state.book}_${idx.toString().padStart(2, '0')}.mp3`;
        document.getElementById('audioTitle').innerText = `${state.book} - ${label}`;
        mainAudio.src = fileName;
        mainAudio.play().catch(() => { document.getElementById('audioTitle').innerText = "❌ 檔案未找到: " + fileName; });
        document.getElementById('playerSection').style.display = 'block';
        resetAB();
    }

    // --- 播放控制 ---
    function togglePlay() { mainAudio.paused ? mainAudio.play() : mainAudio.pause(); }
    mainAudio.onplay = () => { document.getElementById('playPauseBtn').innerText = "pause_circle_filled"; startCountdown(); };
    mainAudio.onpause = () => { document.getElementById('playPauseBtn').innerText = "play_circle_filled"; stopCountdown(); };

    function skipTrack(dir) {
        let nextIdx = state.currentIdx + dir;
        if(nextIdx < 1) return;
        let isOdd = nextIdx % 2 !== 0;
        let label = (state.bookType === "vocab") ? (isOdd ? "造句單元" : "附錄字表") : (isOdd ? "字表" : "造句");
        playFile(nextIdx, null, label);
    }

    document.getElementById('speedBtn').onclick = function() {
        const rates = [1.0, 1.2, 1.5, 0.8];
        let idx = rates.indexOf(mainAudio.playbackRate);
        mainAudio.playbackRate = rates[(idx + 1) % rates.length];
        this.innerText = mainAudio.playbackRate + "x";
    };

    // --- AB 與 進度 ---
    function setPoint(type) {
        if(type === 'A') { pointA = mainAudio.currentTime; document.getElementById('setABBtnA').classList.add('active'); }
        else { pointB = mainAudio.currentTime; document.getElementById('setABBtnB').classList.add('active'); }
        updateABUI();
    }
    function resetAB() {
        pointA = null; pointB = null;
        document.getElementById('setABBtnA').classList.remove('active');
        document.getElementById('setABBtnB').classList.remove('active');
        updateABUI();
    }
    function updateABUI() {
        const d = mainAudio.duration || 1;
        document.getElementById('markerA').style.display = pointA !== null ? 'block' : 'none';
        document.getElementById('markerA').style.left = (pointA/d*100)+'%';
        document.getElementById('markerB').style.display = pointB !== null ? 'block' : 'none';
        document.getElementById('markerB').style.left = (pointB/d*100)+'%';
        const high = document.getElementById('abHighlight');
        if(pointA!==null && pointB!==null) {
            high.style.display = 'block'; high.style.left = (pointA/d*100)+'%'; high.style.width = ((pointB-pointA)/d*100)+'%';
        } else high.style.display = 'none';
    }
    function updateProgressUI() {
        const cur = mainAudio.currentTime, dur = mainAudio.duration || 0;
        document.getElementById('progressBar').style.width = (cur/dur*100)+'%';
        document.getElementById('currentTime').innerText = formatT(cur);
        document.getElementById('durationTime').innerText = formatT(dur);
        if(pointA!==null && pointB!==null && cur >= pointB) mainAudio.currentTime = pointA;
    }
    document.getElementById('progressContainer').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        mainAudio.currentTime = ((e.clientX - rect.left) / rect.width) * mainAudio.duration;
    };
    function formatT(s) { return Math.floor(s/60)+":"+Math.floor(s%60).toString().padStart(2,'0'); }
</script>
</body>
</html>
