<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>強咖這樣背 - 全功能播放器</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding: 20px; line-height: 1.6; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .logo-img { height: 50px; width: auto; }
        .book-cover-img { height: 60px; width: auto; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        h2 { color: #1a73e8; margin: 0; font-size: 24px; white-space: nowrap; }
        
        .form-group { margin-bottom: 25px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        label { font-weight: bold; color: #5f6368; border-left: 4px solid #1a73e8; padding-left: 8px; margin: 0; }
        
        /* 倒數計時與 IP 標記樣式 */
        .timer-display { color: #d93025; font-weight: bold; font-family: monospace; font-size: 16px; background: #fce8e6; padding: 2px 8px; border-radius: 4px; }
        .ip-marker { font-size: 13px; color: #1a73e8; background: #e8f0fe; padding: 2px 8px; border-radius: 20px; font-weight: bold; }

        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .action-btn { padding: 12px; border: 2px solid #dadce0; border-radius: 8px; background: white; color: #5f6368; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s ease; }
        .phrase-btn-style { background-color: #fdf5e6 !important; border-color: #f5deb3; }
        .action-btn.active { background-color: #1a73e8 !important; color: #ffffff !important; border-color: #1a73e8 !important; box-shadow: 0 2px 8px rgba(26, 115, 232, 0.4); text-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        select { width: 100%; padding: 12px; border: 2px solid #dadce0; border-radius: 8px; font-size: 16px; cursor: pointer; background-color: #fff; }

        /* 播放器 UI */
        .audio-player { margin-top: 30px; display: none; padding: 45px 20px 20px; background: white; border-radius: 12px; position: relative; border-top: 1px solid #eee; }
        #audioTitle { font-weight: bold; color: #1a73e8; display: block; text-align: center; margin-bottom: 25px; font-size: 14px; height: 1.2em; }
        .player-top-ctrls { position: absolute; top: 10px; width: calc(100% - 40px); display: flex; justify-content: space-between; align-items: center; }
        .speed-pill { background: #e8f0fe; color: #1a73e8; padding: 6px 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .player-seek-bar { position: relative; width: 100%; height: 50px; margin-top: 20px; }
        .progress-container { width: 100%; height: 4px; background: #e0e0e0; position: absolute; top: 25px; cursor: pointer; }
        .progress-bar { height: 100%; background: #1a73e8; width: 0%; position: relative; pointer-events: none; }
        .progress-bar::after { content: ''; position: absolute; right: -6px; top: -5px; width: 14px; height: 14px; background: #1a73e8; border-radius: 50%; }
        .ab-marker { position: absolute; top: 5px; color: #EF6C00; font-weight: bold; font-size: 12px; transform: translateX(-50%); display: none; z-index: 5; }
        .ab-highlight { height: 100%; background: rgba(255, 152, 0, 0.3); position: absolute; top: 0; display: none; pointer-events: none; }
        .time-display { display: flex; justify-content: space-between; font-size: 13px; color: #5f6368; margin-top: 35px; font-family: monospace; }

        .main-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0; }
        .ctrl-btn { border: none; background: none; color: #3c4043; font-size: 32px; cursor: pointer; }
        #playPauseBtn { font-size: 55px; color: #1a73e8; }
        
        .ab-set-group { display: flex; justify-content: space-around; gap: 8px; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ddd; }
        .ab-set-btn { flex: 1; border: 1px solid #dadce0; border-radius: 8px; padding: 10px 5px; background: white; color: #5f6368; cursor: pointer; font-size: 13px; font-weight: bold; }
        .ab-set-btn.active { background: #fff7e6; color: #EF6C00; border-color: #EF6C00; }
        .clear-btn { color: #d93025; border-color: #fad2cf; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="LOGO.png" alt="Logo" class="logo-img">
        <h2>強咖這樣背</h2>
        <img id="dynamicCover" src="" alt="Cover" class="book-cover-img">
    </div>

    <div class="form-group">
        <div class="label-row">
            <label>1. 選擇教材</label>
            <div id="userMarker" class="ip-marker">正在載入標記...</div>
        </div>
        <div class="btn-grid" style="grid-template-columns: repeat(3, 1fr);">
            <button class="action-btn book-btn" data-type="vocab" data-value="Book1" data-cover="BOOK1封面.png">Book 1</button>
            <button class="action-btn book-btn" data-type="vocab" data-value="Book2" data-cover="BOOK2封面.png">Book 2</button>
            <button class="action-btn book-btn" data-type="vocab" data-value="Book3" data-cover="BOOK3封面.png">Book 3</button>
            <button class="action-btn book-btn phrase-btn-style" data-type="phrase" data-value="PhraseUp" data-cover="片語強咖這樣背上冊封面.png" style="grid-column: span 1.5;">片語(上)</button>
            <button class="action-btn book-btn phrase-btn-style" data-type="phrase" data-value="PhraseDown" data-cover="片語強咖這樣背下冊封面.png" style="grid-column: span 1.5;">片語(下)</button>
        </div>
    </div>

    <div class="form-group">
        <div class="label-row">
            <label>2. 選擇週次</label>
            <div id="countdown" class="timer-display">10:00</div>
        </div>
        <select id="weekSelect" disabled><option value="">-- 請先選擇教材 --</option></select>
    </div>

    <div class="form-group" id="unitArea" style="display:none;">
        <label>3. 選擇單元</label>
        <div id="unitBtnGroup" class="btn-grid"></div>
    </div>

    <div class="form-group" id="contentArea" style="display:none;">
        <label id="contentLabel">4. 播放內容</label>
        <div id="contentBtnGroup" class="btn-grid"></div>
    </div>

    <div id="playerSection" class="audio-player">
        <div class="player-top-ctrls">
            <button id="speedBtn" class="speed-pill">1.0x</button>
            <span style="font-size: 12px; color: #999;">AB 複讀模式</span>
        </div>
        <span id="audioTitle">準備播放...</span>
        <div class="player-seek-bar">
            <div id="markerA" class="ab-marker">A</div>
            <div id="markerB" class="ab-marker">B</div>
            <div class="progress-container" id="progressContainer">
                <div id="abHighlight" class="ab-highlight"></div>
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-display"><span id="currentTime">00:00</span><span id="durationTime">00:00</span></div>
        </div>
        <audio id="mainAudio"></audio>
        <div class="main-controls">
            <button class="ctrl-btn material-icons" id="prevTrackBtn">skip_previous</button>
            <button class="ctrl-btn material-icons" id="rewindBtn">replay_5</button>
            <button id="playPauseBtn" class="ctrl-btn material-icons">play_circle_filled</button>
            <button class="ctrl-btn material-icons" id="forwardBtn">forward_5</button>
            <button class="ctrl-btn material-icons" id="nextTrackBtn">skip_next</button>
        </div>
        <div class="ab-set-group">
            <button id="setABBtnA" class="ab-set-btn">標記 A 點</button>
            <button id="setABBtnB" class="ab-set-btn">標記 B 點</button>
            <button id="clearABBtn" class="ab-set-btn clear-btn">清除標記</button>
        </div>
    </div>
</div>

<script>
    const mainAudio = document.getElementById('mainAudio');
    const weekSelect = document.getElementById('weekSelect');
    const unitArea = document.getElementById('unitArea');
    const unitBtnGroup = document.getElementById('unitBtnGroup');
    const contentArea = document.getElementById('contentArea');
    const contentBtnGroup = document.getElementById('contentBtnGroup');
    const dynamicCover = document.getElementById('dynamicCover');
    
    let state = { book: "", bookType: "", week: "", unit: "", currentIdx: 0 };
    let pointA = null, pointB = null;
    let speedIdx = 2; 
    const speeds = [0.6, 0.8, 1.0, 1.2, 1.5];

    // --- 倒數計時功能 ---
    let timeLeft = 600; // 10分鐘 = 600秒
    let timerId = null;

    function startTimer() {
        if (timerId) return;
        timerId = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
            } else {
                clearInterval(timerId);
                timerId = null;
                alert("恭喜過關！！🥳");
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerId);
        timerId = null;
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('countdown').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- 防偽標記功能 ---
    function initUserMarker() {
        const animals = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦅','🦉','🦇','🐺','🐗','🐴','🦄','🐝','🐛','🦋','🐌','🐞','🐜','🦟','🦗','🕷','🕸','🦂','🐢','🐍','🦎','🐙','🦑','🦐','🦞','🦀','🐡','🐠','🐟','🐬','🐳','🐋','🦈','🐊','🐅','🐆','🦓','🦍','🦧','🐘','🦛','🦏','🐪','🐫','🦒','🦘','🐃','🐂','🐄','🐎','🐖','🐏','🐑','🐐','🦌','🐕','🐩','🐈','🐓','🦃','🦚','🦜','🦢','🦩','🐇','🦝','🦨','🦡','🦦','🦥','🐁','🐀','🐿','🦔'];
        const randomAnimal = animals[Math.floor(Math.random() * animals.length)];
        
        // 獲取簡單識別碼 (使用隨機數模擬 IP 後三碼，或透過 API 獲取)
        // 為了展示方便，這裡先產生一個隨機 3 位數。若要真實 IP，需調用第三方服務。
        const randomIPPart = Math.floor(Math.random() * 900 + 100); 
        document.getElementById('userMarker').innerText = `${randomAnimal} ${randomIPPart}`;
    }
    initUserMarker();

    // 監聽播放狀態連動計時器
    mainAudio.onplay = startTimer;
    mainAudio.onpause = stopTimer;
    mainAudio.onended = stopTimer;

    // --- 教材聯動邏輯 (保留您原有的功能) ---
    document.querySelectorAll('.book-btn').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.book-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            state.book = this.getAttribute('data-value');
            state.bookType = this.getAttribute('data-type');
            dynamicCover.src = this.getAttribute('data-cover');
            dynamicCover.style.display = 'block';
            weekSelect.disabled = false;
            weekSelect.innerHTML = '<option value="">-- 選擇週次 --</option>';
            let start, end;
            if (state.book === "PhraseUp") { start = 1; end = 25; }
            else if (state.book === "PhraseDown") { start = 26; end = 50; }
            else { 
                start = state.book === "Book1" ? 1 : state.book === "Book2" ? 19 : 37;
                end = start + 17;
            }
            for(let i = start; i <= end; i++) weekSelect.innerHTML += `<option value="${i}">第 ${i} 週</option>`;
            unitArea.style.display = 'none'; contentArea.style.display = 'none';
        };
    });

    weekSelect.onchange = function() {
        if (!this.value) return;
        state.week = parseInt(this.value);
        if (state.bookType === "vocab") {
            unitArea.style.display = 'block'; contentArea.style.display = 'none';
            unitBtnGroup.innerHTML = '';
            const uStart = (state.week - 1) * 2 + 1;
            [uStart, uStart + 1].forEach(u => {
                const btn = document.createElement('button');
                btn.className = 'action-btn'; btn.innerText = `Unit ${u}`;
                btn.onclick = () => {
                    Array.from(unitBtnGroup.children).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.unit = u; contentArea.style.display = 'block'; renderVocabContent(u);
                };
                unitBtnGroup.appendChild(btn);
            });
        } else {
            unitArea.style.display = 'none'; contentArea.style.display = 'block';
            renderPhraseContent(state.week);
        }
    };

    function renderVocabContent(unitNum) {
        contentBtnGroup.innerHTML = '';
        document.getElementById('contentLabel').innerText = "4. 播放內容";
        [{l:'造句單元', i:unitNum*2-1}, {l:'附錄字表', i:unitNum*2}].forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'action-btn'; btn.innerText = t.l;
            btn.onclick = () => { state.currentIdx = t.i; playAudio(t.i, btn, t.l); };
            contentBtnGroup.appendChild(btn);
        });
    }

    function renderPhraseContent(week) {
        contentBtnGroup.innerHTML = '';
        document.getElementById('contentLabel').innerText = "3. 選擇內容";
        [{l:'字表', i:week*2-1}, {l:'造句', i:week*2}].forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'action-btn'; btn.innerText = t.l;
            btn.onclick = () => { state.currentIdx = t.i; playAudio(t.i, btn, `第 ${week} 週 - ${t.l}`); };
            contentBtnGroup.appendChild(btn);
        });
    }

    function playAudio(index, btn, label) {
        if(btn) {
            Array.from(contentBtnGroup.children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        state.currentIdx = index;
        const fileName = `${state.book}_${index.toString().padStart(2, '0')}.mp3`;
        document.getElementById('audioTitle').innerText = `${state.book} - ${label || '正在切換...'}`;
        mainAudio.src = fileName;
        mainAudio.load(); mainAudio.play();
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('playPauseBtn').innerText = "pause_circle_filled";
        resetAB();
    }

    // --- 播放控制與 AB (保持不變) ---
    document.getElementById('nextTrackBtn').onclick = () => {
        let max = (state.bookType === "vocab") ? 72 : 100;
        if(state.currentIdx < max) {
            state.currentIdx++;
            let label = (state.bookType === "vocab") ? (state.currentIdx % 2 !== 0 ? "造句單元" : "附錄字表") : `第 ${Math.ceil(state.currentIdx/2)} 週 - ${state.currentIdx % 2 !== 0 ? '字表' : '造句'}`;
            playAudio(state.currentIdx, null, label);
        }
    };
    document.getElementById('prevTrackBtn').onclick = () => {
        if(state.currentIdx > 1) {
            state.currentIdx--;
            let label = (state.bookType === "vocab") ? (state.currentIdx % 2 !== 0 ? "造句單元" : "附錄字表") : `第 ${Math.ceil(state.currentIdx/2)} 週 - ${state.currentIdx % 2 !== 0 ? '字表' : '造句'}`;
            playAudio(state.currentIdx, null, label);
        }
    };
    document.getElementById('speedBtn').onclick = () => {
        speedIdx = (speedIdx + 1) % speeds.length;
        mainAudio.playbackRate = speeds[speedIdx];
        document.getElementById('speedBtn').innerText = speeds[speedIdx].toFixed(1) + "x";
    };
    document.getElementById('playPauseBtn').onclick = function() {
        if (mainAudio.paused) { mainAudio.play(); this.innerText = "pause_circle_filled"; }
        else { mainAudio.pause(); this.innerText = "play_circle_filled"; }
    };
    document.getElementById('rewindBtn').onclick = () => mainAudio.currentTime -= 5;
    document.getElementById('forwardBtn').onclick = () => mainAudio.currentTime += 5;
    document.getElementById('setABBtnA').onclick = function() { pointA = mainAudio.currentTime; this.classList.add('active'); updateABVisuals(); };
    document.getElementById('setABBtnB').onclick = function() {
        if (pointA === null) return alert("請先標記 A 點");
        pointB = mainAudio.currentTime; if (pointB <= pointA) return alert("B 點要在 A 之後");
        this.classList.add('active'); updateABVisuals();
    };
    document.getElementById('clearABBtn').onclick = resetAB;
    function resetAB() {
        pointA = null; pointB = null;
        document.getElementById('setABBtnA').classList.remove('active');
        document.getElementById('setABBtnB').classList.remove('active');
        updateABVisuals();
    }
    function updateABVisuals() {
        const dur = mainAudio.duration || 0;
        const markerA = document.getElementById('markerA'), markerB = document.getElementById('markerB'), highlight = document.getElementById('abHighlight');
        if (pointA !== null && dur > 0) { markerA.style.left = (pointA/dur*100) + "%"; markerA.style.display = "block"; } else markerA.style.display = "none";
        if (pointB !== null && dur > 0) {
            markerB.style.left = (pointB/dur*100) + "%"; markerB.style.display = "block";
            highlight.style.left = (pointA/dur*100) + "%"; highlight.style.width = ((pointB-pointA)/dur*100) + "%"; highlight.style.display = "block";
        } else { markerB.style.display = "none"; highlight.style.display = "none"; }
    }
    mainAudio.ontimeupdate = () => {
        if (!mainAudio.duration) return;
        const cur = mainAudio.currentTime, dur = mainAudio.duration;
        document.getElementById('currentTime').innerText = fmtTime(cur);
        document.getElementById('durationTime').innerText = fmtTime(dur);
        document.getElementById('progressBar').style.width = (cur/dur*100) + "%";
        if (pointA !== null && pointB !== null && cur >= pointB) mainAudio.currentTime = pointA;
        updateABVisuals();
    };
    document.getElementById('progressContainer').onclick = function(e) {
        const rect = this.getBoundingClientRect();
        mainAudio.currentTime = ((e.clientX - rect.left) / rect.width) * mainAudio.duration;
    };
    function fmtTime(s) { let m = Math.floor(s/60), sec = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
</script>
</body>
</html>
