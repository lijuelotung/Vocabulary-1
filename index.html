<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>課程音檔教材庫</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding: 20px; line-height: 1.6; background-color: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h2 { 
            color: #1a73e8; 
            text-align: center; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
        }

        /* 1. 加大 LOGO */
        .header-logo {
            height: 2.5em; /* 調大尺寸 */
            width: auto;   
            vertical-align: middle; 
        }

        .book-cover {
            height: 2.5em; 
            width: auto;
            border-radius: 4px;
            display: none; 
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #5f6368; }

        /* 2. 單字書按鈕樣式 */
        .book-options {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .book-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #dadce0;
            border-radius: 8px;
            background-color: white;
            color: #5f6368;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .book-btn:hover { border-color: #1a73e8; color: #1a73e8; }
        .book-btn.active {
            background-color: #1a73e8;
            color: white;
            border-color: #1a73e8;
            box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3);
        }

        select { width: 100%; padding: 12px; border: 2px solid #dadce0; border-radius: 8px; font-size: 16px; appearance: none; background: url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns%3D"http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg"%20width%3D"24"%20height%3D"24"%20viewBox%3D"0%200%2024%2024"><path%20fill%3D"%235F6368"%20d%3D"M7%2010l5%205%205-5z"%2F><%2Fsvg>') no-repeat right 10px center; background-color: white; }
        select:focus { outline: none; border-color: #1a73e8; }
        select:disabled { background-color: #f1f3f4; cursor: not-allowed; }
        
        .audio-player { margin-top: 30px; text-align: center; display: none; padding: 20px; background: #e8f0fe; border-radius: 10px; }
        #audioTitle { font-weight: bold; color: #1967d2; display: block; margin-bottom: 10px; }
        audio { width: 100%; }
        .tip { font-size: 0.85em; color: #e67e22; margin-top: 10px; text-align: center; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <img src="LOGO.png" alt="Logo" class="header-logo">
        📖 單字強咖這樣背
        <img id="bookCover" class="book-cover" src="" alt="書本封面">
    </h2>

    <div class="form-group">
        <label>1. 選擇單字書 (Book)</label>
        <div class="book-options">
            <button class="book-btn" data-value="Book1">BOOK 1</button>
            <button class="book-btn" data-value="Book2">BOOK 2</button>
            <button class="book-btn" data-value="Book3">BOOK 3</button>
        </div>
    </div>

    <div class="form-group">
        <label for="weekSelect">2. 選擇週次 (Week)</label>
        <select id="weekSelect" disabled>
            <option value="">-- 請先選擇單字書 --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="unitSelect">3. 選擇單元 (Unit)</label>
        <select id="unitSelect" disabled>
            <option value="">-- 請先選擇週次 --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="audioSelect">4. 選擇內容類型</label>
        <select id="audioSelect" disabled>
            <option value="">-- 請先選擇單元 --</option>
        </select>
    </div>

    <div id="playerSection" class="audio-player">
        <span id="audioTitle"></span>
        <audio id="mainAudio" controls>
            <source src="" type="audio/mpeg">
            您的瀏覽器不支援音頻播放。
        </audio>
    </div>
    
    <span class="tip">💡 建議使用 Safari 開啟並「加入主畫面」</span>
</div>

<script>
    if (navigator.userAgent.indexOf('Line') > -1) {
        alert('為了更好的播放體驗，請點擊右上角「...」，選擇「使用預設瀏覽器開啟」或「在 Safari 開啟」，並將本網頁「加入主畫面」。');
    }

    const weekSelect = document.getElementById('weekSelect');
    const unitSelect = document.getElementById('unitSelect');
    const audioSelect = document.getElementById('audioSelect');
    const playerSection = document.getElementById('playerSection');
    const mainAudio = document.getElementById('mainAudio');
    const audioTitle = document.getElementById('audioTitle');
    const bookCover = document.getElementById('bookCover');
    const bookBtns = document.querySelectorAll('.book-btn');

    let selectedBookValue = ""; // 儲存當前選中的書

    function pad(num) {
        return num.toString().padStart(2, '0');
    }

    const bookSettings = {
        'Book1': { startWeek: 1 },
        'Book2': { startWeek: 19 },
        'Book3': { startWeek: 37 }
    };

    // 1. 單字書按鈕點擊事件
    bookBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            // 切換按鈕樣式
            bookBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            selectedBookValue = this.getAttribute('data-value');

            // 更新封面
            bookCover.src = `${selectedBookValue.toUpperCase()}封面.png`; 
            bookCover.style.display = 'block';

            // 重置下方選單
            weekSelect.innerHTML = '<option value="">-- 選擇週次 --</option>';
            unitSelect.innerHTML = '<option value="">-- 請先選擇週次 --</option>';
            audioSelect.innerHTML = '<option value="">-- 請先選擇單元 --</option>';
            weekSelect.disabled = false;
            unitSelect.disabled = true;
            audioSelect.disabled = true;
            playerSection.style.display = 'none';

            // 填充週次
            const start = bookSettings[selectedBookValue].startWeek;
            for (let i = 0; i < 18; i++) {
                let currentWeek = start + i;
                let opt = document.createElement('option');
                opt.value = currentWeek;
                opt.innerHTML = `第 ${currentWeek} 週`;
                weekSelect.appendChild(opt);
            }
        });
    });

    // 2. 週次變動
    weekSelect.addEventListener('change', function() {
        unitSelect.innerHTML = '<option value="">-- 選擇單元 --</option>';
        audioSelect.innerHTML = '<option value="">-- 請先選擇單元 --</option>';
        audioSelect.disabled = true;
        playerSection.style.display = 'none';

        if (this.value) {
            unitSelect.disabled = false;
            const weekNum = parseInt(this.value);
            for (let i = 1; i <= 2; i++) {
                let unitNum = (weekNum - 1) * 2 + i;
                let opt = document.createElement('option');
                opt.value = unitNum;
                opt.innerHTML = `Unit ${unitNum}`;
                unitSelect.appendChild(opt);
            }
        } else {
            unitSelect.disabled = true;
        }
    });

    // 3. 單元變動
    unitSelect.addEventListener('change', function() {
        audioSelect.innerHTML = '<option value="">-- 選擇類型 --</option>';
        if (this.value) {
            audioSelect.disabled = false;
            const unitNum = parseInt(this.value);
            
            const relativeUnitIdx = ((unitNum - 1) % 36) + 1;
            const sentenceIdx = pad((relativeUnitIdx * 2) - 1);
            const wordIdx = pad(relativeUnitIdx * 2);

            let opt1 = document.createElement('option');
            opt1.value = `${selectedBookValue}_${sentenceIdx}.mp3`;
            opt1.innerHTML = `Unit ${unitNum} 造句單元`;
            audioSelect.appendChild(opt1);

            let opt2 = document.createElement('option');
            opt2.value = `${selectedBookValue}_${wordIdx}.mp3`;
            opt2.innerHTML = `Unit ${unitNum} 附錄字表`;
            audioSelect.appendChild(opt2);
        } else {
            audioSelect.disabled = true;
        }
    });

    // 4. 播放
    audioSelect.addEventListener('change', function() {
        if (this.value) {
            audioTitle.innerText = this.options[this.selectedIndex].text;
            mainAudio.src = this.value;
            playerSection.style.display = 'block';
            mainAudio.load();
            mainAudio.play(); 
        }
    });
</script>

</body>
</html>
